<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leonéia Evangelista – Senior UX Researcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1f2e;
    --bg-soft: #1f2436;
    --bg-warm: #21263a;
    --ink: #e8e6dd;
    --ink-soft: #b8b6ad;
    --ink-muted: #7c7e8a;
    --ink-faint: #4a4d5e;
    --gold: #d4b88a;
    --gold-soft: #b89968;
    --rose: #e0a89a;
    --line: rgba(232, 230, 221, 0.08);
    --line-strong: rgba(232, 230, 221, 0.14);
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 15% 10%, rgba(212, 184, 138, 0.08), transparent 70%),
      radial-gradient(ellipse 700px 500px at 85% 30%, rgba(150, 130, 180, 0.07), transparent 70%),
      radial-gradient(ellipse 900px 700px at 50% 80%, rgba(180, 130, 110, 0.05), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(232, 230, 221, 0.015) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  ::selection { background: var(--gold); color: var(--bg); }

  /* ============ NAV ============ */
  nav.top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 6vw;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(26, 31, 46, 0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--line);
    transition: padding 0.4s;
  }
  .nav-mark {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 400;
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-mark em { font-style: italic; color: var(--gold); }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(212, 184, 138, 0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(212, 184, 138, 0); }
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--ink-muted); text-decoration: none;
    transition: color 0.4s;
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -6px; left: 0;
    width: 0; height: 1px; background: var(--gold);
    transition: width 0.4s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after { width: 100%; }

  /* ============ HERO ============ */
  section.hero {
    min-height: 100vh;
    padding: 0 6vw;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative;
    margin-top: 80px;
  }
  .hero-meta-top {
    position: absolute; top: 100px; left: 6vw; right: 6vw;
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--ink-muted);
  }
  .hero-meta-top .dot::before {
    content: '●'; color: var(--gold);
    margin-right: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 14px;
  }
  .hero-eyebrow::before {
    content: ''; width: 32px; height: 1px; background: var(--gold);
  }
  h1.hero-name {
    font-family: 'Fraunces', serif;
    font-size: clamp(56px, 11vw, 168px);
    font-weight: 300; line-height: 0.88;
    letter-spacing: -0.045em;
    margin-bottom: 5vh;
  }
  .hero-name .row { display: block; overflow: hidden; }
  .hero-name .row span { display: block; }
  .hero-name em {
    font-style: italic; color: var(--gold);
    font-weight: 300;
  }
  .hero-name .indent { padding-left: clamp(20px, 8%, 100px); }

  .reveal-up { animation: revealUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .reveal-up.d2 { animation-delay: 0.15s; }
  .reveal-up.d3 { animation-delay: 0.3s; }
  @keyframes revealUp {
    from { transform: translateY(110%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .hero-bottom {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 5vw; align-items: end;
    margin-top: 2vh;
  }
  .hero-tagline {
    font-family: 'Fraunces', serif;
    font-size: clamp(20px, 2.4vw, 30px);
    line-height: 1.4; font-weight: 300;
    color: var(--ink-soft);
    max-width: 640px;
    letter-spacing: -0.01em;
  }
  .hero-tagline em { font-style: italic; color: var(--gold); }
  .hero-actions {
    display: flex; flex-direction: column; gap: 18px;
    align-items: flex-end;
  }
  .hero-scroll {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-muted);
    display: flex; align-items: center; gap: 14px;
  }
  .hero-scroll-line {
    display: inline-block;
    width: 1px; height: 48px;
    background: linear-gradient(180deg, var(--gold), transparent);
    animation: scrollPulse 2.4s ease-in-out infinite;
    transform-origin: top;
  }
  @keyframes scrollPulse {
    0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .cta-row { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; }
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 14px 24px;
    border-radius: 100px;
    text-decoration: none;
    transition: all 0.4s ease;
    border: 1px solid transparent;
    letter-spacing: 0.2px;
  }
  .cta.primary {
    background: var(--gold); color: var(--bg);
  }
  .cta.primary:hover {
    background: var(--ink); gap: 16px;
    box-shadow: 0 8px 24px rgba(212, 184, 138, 0.25);
  }
  .cta.ghost {
    border-color: var(--line-strong); color: var(--ink);
    background: transparent;
  }
  .cta.ghost:hover {
    border-color: var(--gold); color: var(--gold);
    background: rgba(212, 184, 138, 0.04);
  }
  .cta-arrow { transition: transform 0.4s; }
  .cta:hover .cta-arrow { transform: translateX(4px); }

  /* ============ SECTION SHELL ============ */
  section.block { padding: 14vh 6vw; position: relative; }
  .section-tag {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 36px;
  }
  .section-tag::before {
    content: ''; width: 28px; height: 1px; background: var(--gold);
  }
  .section-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-muted);
    margin-left: 4px;
  }

  /* ============ ABOUT ============ */
  .about-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 6vw;
    align-items: start;
  }
  .about-prose {
    font-family: 'Fraunces', serif;
    font-size: clamp(22px, 2.4vw, 32px);
    line-height: 1.45; font-weight: 300;
    letter-spacing: -0.012em;
    color: var(--ink);
  }
  .about-prose p {
    margin-bottom: 0.9em;
    opacity: 0;
    transform: translateY(20px);
  }
  .about-prose p.in {
    animation: fadeUp 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .about-prose p.in:nth-child(2) { animation-delay: 0.15s; }
  .about-prose p.in:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .about-prose em { font-style: italic; color: var(--gold); }
  .about-meta {
    position: sticky; top: 100px;
    display: flex; flex-direction: column; gap: 28px;
    padding: 28px;
    background: rgba(232, 230, 221, 0.02);
    border: 1px solid var(--line);
    border-radius: 16px;
    backdrop-filter: blur(10px);
  }
  .about-meta-item {
    display: flex; flex-direction: column; gap: 6px;
  }
  .about-meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold);
  }
  .about-meta-value {
    font-family: 'Fraunces', serif;
    font-size: 17px; font-weight: 400;
    color: var(--ink);
    line-height: 1.4;
  }
  .about-meta-value em { font-style: italic; color: var(--ink-soft); }
  .about-meta-value a {
    color: var(--ink); text-decoration: none;
    border-bottom: 1px dashed var(--line-strong);
    transition: all 0.3s;
  }
  .about-meta-value a:hover {
    color: var(--gold); border-bottom-color: var(--gold);
  }
  .lang-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .lang-pill {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    color: var(--ink-soft);
  }
  .lang-pill em { color: var(--gold); font-style: normal; margin-left: 4px; }

  /* ============ FOCUS ============ */
  .focus {
    padding: 14vh 6vw 12vh;
  }
  .focus-intro {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 6vw;
    margin-bottom: 8vh;
    align-items: end;
  }
  .focus-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 6vw, 92px);
    font-weight: 300; line-height: 1;
    letter-spacing: -0.035em;
  }
  .focus-title em { font-style: italic; color: var(--gold); }
  .focus-intro-text {
    font-family: 'Fraunces', serif;
    font-size: 19px; line-height: 1.6; font-weight: 300;
    color: var(--ink-soft);
    max-width: 480px;
    padding-bottom: 12px;
  }

  .focus-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .focus-card {
    background: linear-gradient(180deg, rgba(232, 230, 221, 0.025), rgba(232, 230, 221, 0.01));
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 32px;
    display: flex; flex-direction: column; gap: 18px;
    min-height: 280px;
    cursor: default;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .focus-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.5s;
  }
  .focus-card:hover {
    border-color: rgba(212, 184, 138, 0.3);
    transform: translateY(-4px);
    background: linear-gradient(180deg, rgba(212, 184, 138, 0.04), rgba(232, 230, 221, 0.01));
  }
  .focus-card:hover::before { opacity: 1; }
  .focus-card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: var(--ink-muted);
  }
  .focus-card-title {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 300;
    line-height: 1.1; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .focus-card-title em { font-style: italic; color: var(--gold); }
  .focus-card-desc {
    font-size: 14px; line-height: 1.7;
    color: var(--ink-soft);
    margin-top: auto;
  }
  .focus-card-arrow {
    position: absolute;
    top: 32px; right: 32px;
    font-family: 'Fraunces', serif;
    font-size: 20px; color: var(--gold);
    opacity: 0;
    transform: translate(-6px, 6px);
    transition: all 0.4s;
  }
  .focus-card:hover .focus-card-arrow {
    opacity: 1;
    transform: translate(0, 0);
  }

  /* ============ EXPERIENCE ============ */
  .exp {
    padding: 12vh 6vw;
  }
  .exp-header {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 6vw;
    margin-bottom: 8vh;
    align-items: end;
  }
  .exp-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 6vw, 92px);
    font-weight: 300; line-height: 1;
    letter-spacing: -0.035em;
  }
  .exp-title em { font-style: italic; color: var(--gold); }
  .exp-intro {
    font-family: 'Fraunces', serif;
    font-size: 19px; line-height: 1.6; font-weight: 300;
    color: var(--ink-soft);
    max-width: 480px;
    padding-bottom: 12px;
  }

  .exp-list {
    border-top: 1px solid var(--line);
  }
  .exp-row {
    display: grid;
    grid-template-columns: 140px 1fr 80px;
    gap: 4vw;
    padding: 32px 0;
    border-bottom: 1px solid var(--line);
    align-items: baseline;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .exp-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(90deg, rgba(212, 184, 138, 0.08), transparent 60%);
    transition: width 0.5s;
    z-index: -1;
  }
  .exp-row:hover {
    padding-left: 24px;
    border-bottom-color: var(--line-strong);
  }
  .exp-row:hover::before { width: 100%; }
  .exp-row:hover .exp-role { color: var(--gold); }
  .exp-row:hover .exp-mark {
    transform: translateX(0);
    opacity: 1;
  }
  .exp-row.expanded .exp-details {
    max-height: 600px;
    opacity: 1;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--line-strong);
  }
  .exp-row.expanded .exp-mark { transform: rotate(45deg); }

  .exp-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    color: var(--ink-muted);
    text-transform: uppercase;
  }
  .exp-content {
    display: flex; flex-direction: column;
  }
  .exp-role {
    font-family: 'Fraunces', serif;
    font-size: clamp(22px, 2.4vw, 30px);
    font-weight: 400; line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--ink);
    transition: color 0.4s;
  }
  .exp-role em { font-style: italic; color: var(--gold); }
  .exp-co {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .exp-details {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .exp-bullets {
    display: flex; flex-direction: column; gap: 10px;
    padding-left: 14px;
    list-style: none;
    font-size: 14px; line-height: 1.7;
    color: var(--ink-soft);
  }
  .exp-bullets li {
    position: relative;
    padding-left: 18px;
  }
  .exp-bullets li::before {
    content: '→';
    position: absolute;
    left: 0; top: 0;
    color: var(--gold);
  }
  .exp-mark {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--gold);
    text-align: right;
    opacity: 0.5;
    transform: translateX(-8px);
    transition: all 0.4s;
    font-style: italic;
  }

  /* ============ EDUCATION ============ */
  .edu {
    padding: 12vh 6vw;
  }
  .edu-header {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 6vw;
    margin-bottom: 8vh;
    align-items: end;
  }
  .edu-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 6vw, 92px);
    font-weight: 300; line-height: 1;
    letter-spacing: -0.035em;
  }
  .edu-title em { font-style: italic; color: var(--gold); }
  .edu-intro {
    font-family: 'Fraunces', serif;
    font-size: 19px; line-height: 1.6; font-weight: 300;
    color: var(--ink-soft);
    max-width: 480px;
    padding-bottom: 12px;
  }
  .edu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .edu-card {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px;
    transition: all 0.5s;
    background: rgba(232, 230, 221, 0.015);
    display: flex; flex-direction: column; gap: 12px;
    min-height: 180px;
  }
  .edu-card:hover {
    border-color: rgba(212, 184, 138, 0.3);
    background: rgba(212, 184, 138, 0.03);
  }
  .edu-degree {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold);
  }
  .edu-name {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 400;
    line-height: 1.2; letter-spacing: -0.015em;
    color: var(--ink);
  }
  .edu-school {
    font-size: 13px; color: var(--ink-soft); line-height: 1.5;
    margin-top: auto;
  }
  .edu-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    color: var(--ink-muted);
  }

  /* ============ SKILLS ============ */
  .skills {
    padding: 12vh 6vw;
  }
  .skills-header {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 6vw;
    margin-bottom: 8vh;
    align-items: end;
  }
  .skills-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 6vw, 92px);
    font-weight: 300; line-height: 1;
    letter-spacing: -0.035em;
  }
  .skills-title em { font-style: italic; color: var(--gold); }
  .skills-intro {
    font-family: 'Fraunces', serif;
    font-size: 19px; line-height: 1.6; font-weight: 300;
    color: var(--ink-soft);
    max-width: 480px;
    padding-bottom: 12px;
  }

  .skill-clusters {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
  }
  .skill-cluster {
    display: flex; flex-direction: column; gap: 14px;
  }
  .skill-cluster-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .skill-cluster-label::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-tag {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    color: var(--ink-soft);
    cursor: default;
    transition: all 0.3s ease;
    background: rgba(232, 230, 221, 0.015);
  }
  .skill-tag:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(212, 184, 138, 0.06);
    transform: translateY(-2px);
  }

  /* ============ CONTACT ============ */
  .contact {
    padding: 16vh 6vw 8vh;
    text-align: center;
    position: relative;
  }
  .contact-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 36px;
    display: inline-flex; align-items: center; gap: 12px;
  }
  .contact-tag::before, .contact-tag::after {
    content: ''; width: 28px; height: 1px; background: var(--gold);
  }
  .contact-line {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 7vw, 110px);
    font-weight: 300; line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 28px;
    max-width: 1100px;
    margin-left: auto; margin-right: auto;
  }
  .contact-line em { font-style: italic; color: var(--gold); }
  .contact-sub {
    font-family: 'Fraunces', serif;
    font-size: 19px; line-height: 1.6; font-weight: 300;
    color: var(--ink-soft);
    max-width: 540px;
    margin: 0 auto 48px;
